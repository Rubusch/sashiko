### RTX 4000 ADA experiments (2/2)
[ai.openai_compat]
#base_url = "http://localhost:11434/v1/chat/completions"
base_url = "http://localhost:11434/v1"

context_window_size = 16384
#context_window_size = 32768 # 7b
#context_window_size = 48000
#context_window_size = 65536
#context_window_size = 131072 ## OLLAMA may use rouping in Modelfile inside

## increase max_tokens if "out:" shows max and then fails
max_tokens = 4096
#max_tokens = 8192 # 7b
#max_tokens = 16384

#frequency_penalty = 1.2    # Discourages the model from repeating words/lines
#presence_penalty = 0.5     # Encourages the model to introduce new tokens

[server]
host = "::"
port = 8080

### TODO project "RAG"
[rag]
enabled = true
db_path = "/path/to/linux/drivers_crypto_index.db"
# db_type = "chroma" # or "faiss" / "grep" ## vector DB, not good!
# db_path = "/path/to/linux/drivers_crypto_index.db"
subsystem_filter = "drivers/crypto/"

[git]
repository_path = "/home/user/linux/github__docker__linux/docker/workspace/linux-cryptodev"

# Track custom remotes and attempt to apply patches on their branches
# [[git.custom_remotes]]
# name = "remote-name"
# url = "git://my-custom.com/remote"
# check_all_branches = true
# only_branches = []

[review]
#concurrency = 20
concurrency = 1
worktree_dir = "review_trees"
#timeout_seconds = 7200
timeout_seconds = 14400
max_retries = 5
#max_retries = 1           ## gemini free (2/2)
#max_comments_per_file = 3 ##
#interval_seconds = 59     ##
ignore_files = ["MAINTAINERS", ".mailmap", ".gitignore", "LICENSES/"]
